# ==============================================================================
# AuraLite Shader Pack - Menu & Settings Configuration (Enhanced Shadows Edition)
# ==============================================================================

# Main Screen Layout
screen = [LIGHTING] [FOLIAGE] [WATER] [CLOUDS_MENU] [POST_PROCESS]

# Sub-Screen Layouts
screen.LIGHTING = SHADOWS SHADOW_RES SHADOW_SOFTNESS LIGHTMAP_WARMTH COZY_LIGHTS PBR_LIGHTING PBR_POM PBR_STRENGTH
screen.FOLIAGE = WAVING_LEAVES WAVING_GRASS WIND_SPEED
screen.WATER = WATER_WAVES WATER_TRANSPARENCY WATER_RIFFLES WATER_SPECULAR_STRENGTH
screen.CLOUDS_MENU = PROCEDURAL_CLOUDS CLOUD_HEIGHT CLOUD_THICKNESS AURORA_MODE AURORA_SPEED AURORA_STRENGTH NEBULA_BRIGHTNESS STARS_BRIGHTNESS STARS_AMOUNT RAINBOW_STRENGTH
screen.POST_PROCESS = FOG_DENSITY_LEVEL GROUND_MIST EXPOSURE COLOR_SATURATION CONTRAST VIGNETTE

# Profiles Configuration
profile.LOW = !SHADOWS !PROCEDURAL_CLOUDS !WATER_WAVES !PBR_LIGHTING !PBR_POM SHADOW_RES=1024 SHADOW_SOFTNESS=1 WIND_SPEED=1 FOG_DENSITY_LEVEL=1 EXPOSURE=1 LIGHTMAP_WARMTH=1 WATER_TRANSPARENCY=1 AURORA_MODE=0 !COZY_LIGHTS !WET_REFLECTIONS
profile.MED = SHADOWS PROCEDURAL_CLOUDS WATER_WAVES PBR_LIGHTING !PBR_POM SHADOW_RES=2048 SHADOW_SOFTNESS=2 WIND_SPEED=2 FOG_DENSITY_LEVEL=2 EXPOSURE=2 LIGHTMAP_WARMTH=2 WATER_TRANSPARENCY=2 CLOUD_HEIGHT=2 CLOUD_THICKNESS=2 PBR_STRENGTH=2 AURORA_MODE=1 AURORA_SPEED=2 AURORA_STRENGTH=2 NEBULA_BRIGHTNESS=2 STARS_BRIGHTNESS=2 STARS_AMOUNT=2 RAINBOW_STRENGTH=2 COZY_LIGHTS WET_REFLECTIONS GROUND_MIST COLOR_SATURATION=2 CONTRAST=2 WATER_RIFFLES=2 WATER_SPECULAR_STRENGTH=2
profile.HIGH = SHADOWS PROCEDURAL_CLOUDS WATER_WAVES PBR_LIGHTING !PBR_POM SHADOW_RES=4096 SHADOW_SOFTNESS=2 WIND_SPEED=2 FOG_DENSITY_LEVEL=2 EXPOSURE=2 LIGHTMAP_WARMTH=2 WATER_TRANSPARENCY=2 CLOUD_HEIGHT=2 CLOUD_THICKNESS=2 PBR_STRENGTH=2 AURORA_MODE=1 AURORA_SPEED=2 AURORA_STRENGTH=2 NEBULA_BRIGHTNESS=2 STARS_BRIGHTNESS=2 STARS_AMOUNT=2 RAINBOW_STRENGTH=2 COZY_LIGHTS WET_REFLECTIONS GROUND_MIST COLOR_SATURATION=2 CONTRAST=2 WATER_RIFFLES=2 WATER_SPECULAR_STRENGTH=2
profile.ULTRA = SHADOWS PROCEDURAL_CLOUDS WATER_WAVES PBR_LIGHTING PBR_POM SHADOW_RES=4096 SHADOW_SOFTNESS=3 WIND_SPEED=3 FOG_DENSITY_LEVEL=3 EXPOSURE=3 LIGHTMAP_WARMTH=3 WATER_TRANSPARENCY=3 CLOUD_HEIGHT=3 CLOUD_THICKNESS=3 PBR_STRENGTH=3 AURORA_MODE=2 AURORA_SPEED=3 AURORA_STRENGTH=3 NEBULA_BRIGHTNESS=3 STARS_BRIGHTNESS=3 STARS_AMOUNT=3 RAINBOW_STRENGTH=3 COZY_LIGHTS WET_REFLECTIONS GROUND_MIST COLOR_SATURATION=3 CONTRAST=3 WATER_RIFFLES=3 WATER_SPECULAR_STRENGTH=3

