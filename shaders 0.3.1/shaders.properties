# ==============================================================================
# AuraLite Shader Pack - Menu & Settings Configuration (v0.2.8 Advanced Physics & Realism Update)
# ==============================================================================
# [v0.2.8] Upgraded to wavelength-dependent Rayleigh extinction for direct sun, sun disk, sun halo and backscatter.
# [v0.2.8] Implemented physical Beer-Lambert light absorption model and scattering for underwater terrain & view.
# [v0.2.8] Enhanced Cook-Torrance BRDF grazing-angle specular limits.
# [v0.2.8] Implemented weather-aware physical PCSS (Percentage Closer Soft Shadows) with contact hardening and rapid weather scattering (Rain & Thunder).
# [FIX v0.2.3] profile.LOW now includes ALL settings keys for consistency.
# [FIX v0.2.3] Added !GROUND_MIST, CONTRAST, COLOR_SATURATION, VIGNETTE, etc. to LOW.
# [FIX v0.2.5] Added <profile> to the main settings screen so presets are visible in-game.
# [FIX v0.2.5] POM is disabled in ALL presets, including ULTRA, because it is unstable on some resource packs/drivers.
# [FIX v0.2.5] Added a settings notice that translations may contain mistakes.
# [FIX v0.2.5] AURORA_MODE=1 now uses a real cold-biome custom uniform instead of fogColor heuristics.
# [FIX v0.2.5] Aurora rendering moved to gbuffers_skybasic and north mask fixed so it is visible again.
# [FIX v0.2.5] CLOUD_DISTANCE added; cloud draw distance scales with LOW/MED/HIGH/ULTRA profiles.
# [FIX v0.2.5] Added EXTREME profile with SSAO/SAO-style contact ambient occlusion.
# [FIX v0.2.5] All profiles use realistic terminator LIGHT_WRAP=1; SSAO enabled on HIGH/ULTRA/EXTREME.

# Main Screen Layout
screen = <profile> [TRANSLATION_NOTICE] [LIGHTING] [SUN_MOON] [FOLIAGE] [WATER] [CLOUDS_MENU] [POST_PROCESS]

# Sub-Screen Layouts
screen.TRANSLATION_NOTICE = <empty> <empty> <empty> <empty>
screen.LIGHTING = SHADOWS SHADOW_RES SHADOW_SOFTNESS SHADOW_DISTANCE SHADOW_TINT AMBIENT_BRIGHTNESS LIGHT_WRAP LIGHTMAP_WARMTH COZY_LIGHTS PBR_LIGHTING PBR_POM PBR_STRENGTH SSAO SSAO_STRENGTH SSR SSR_QUALITY SSR_STRENGTH
screen.SUN_MOON = SUN_INTENSITY SUN_TEMPERATURE SUN_HALO SUNRISE_GLOW <empty> MOON_INTENSITY MOON_TEMPERATURE
screen.FOLIAGE = WAVING_LEAVES WAVING_GRASS WIND_SPEED
screen.WATER = WATER_WAVES WATER_TRANSPARENCY WATER_RIFFLES WATER_SPECULAR_STRENGTH <empty> WATER_WAVE_SCALE WATER_WAVE_DETAIL UNDERWATER_NIGHT_DARKNESS
screen.CLOUDS_MENU = PROCEDURAL_CLOUDS CLOUD_HEIGHT CLOUD_THICKNESS CLOUD_DISTANCE CLOUD_SHADOWS CLOUD_SHADOW_STRENGTH GODRAYS GODRAYS_QUALITY AURORA_MODE AURORA_SPEED AURORA_STRENGTH NEBULA_BRIGHTNESS STARS_BRIGHTNESS STARS_AMOUNT SHOOTING_STARS SHOOTING_STARS_FREQUENCY SHOOTING_STARS_BRIGHTNESS RAINBOW_STRENGTH
screen.POST_PROCESS = FOG_DENSITY_LEVEL GROUND_MIST EXPOSURE COLOR_SATURATION CONTRAST TAA TAA_STRENGTH VIGNETTE

