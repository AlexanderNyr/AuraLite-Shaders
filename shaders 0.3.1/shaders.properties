# TAA history buffer. Keep colortex7 between frames so composite1 can reproject it.
# [v0.2.9.3] colortex6 removed — SSR data is now read directly from colortex2
# (normals) and colortex1 (roughness) in final.fsh. This bypasses the Iris 1.20
# multi-render-target write that was silently dropping colortex6 writes.
colortex7Format=RGBA16F
colortex7Clear=false



# Custom Uniforms
# True cold-biome mask for AURORA_MODE=1 (Only in Cold Biomes).
# The old implementation guessed cold biomes from fogColor, which is unreliable and often false.
# Uses OptiFine/Iris shader parameters: biome_category, biome_precipitation and temperature.
# biome_category: 1 = TAIGA, 7 = ICY; biome_precipitation: 2 = SNOW
variable.bool.auroraColdBiomeRaw = in(biome_category, 1, 7) || biome_precipitation == 2 || temperature < 0.25
uniform.float.auroraColdBiome = smooth(42, if(auroraColdBiomeRaw, 1.0, 0.0), 20, 60)

# Dimension detection uniforms based on biome categories (16 = NETHER, 17 = THEEND)
variable.bool.isNetherRaw = in(biome, BIOME_NETHER, BIOME_NETHER_WASTES, BIOME_SOUL_SAND_VALLEY, BIOME_WARPED_FOREST, BIOME_CRIMSON_FOREST, BIOME_BASALT_DELTAS)
uniform.float.isNetherBiome = smooth(20, if(isNetherRaw, 1.0, 0.0), 10, 30)

variable.bool.isEndRaw = in(biome, BIOME_THE_END, BIOME_SMALL_END_ISLANDS, BIOME_END_MIDLANDS, BIOME_END_HIGHLANDS, BIOME_END_BARRENS)
uniform.float.isEndBiome = smooth(20, if(isEndRaw, 1.0, 0.0), 10, 30)

# Let Iris know that we do not want vanilla sun, moon, or clouds (we render our own beautiful ones)
sun=false
moon=false
clouds=false
sky=true
