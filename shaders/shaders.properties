# ==============================================================================
# AuraLite Shader Pack - Menu & Settings Configuration
# ==============================================================================

# Main Screen Layout
screen = [LIGHTING] [FOLIAGE] [WATER] [CLOUDS_MENU] [POST_PROCESS]

# Sub-Screen Layouts
screen.LIGHTING = SHADOWS SHADOW_RES LIGHTMAP_WARMTH PBR_LIGHTING PBR_STRENGTH
screen.FOLIAGE = WAVING_LEAVES WAVING_GRASS WIND_SPEED
screen.WATER = WATER_WAVES WATER_TRANSPARENCY
screen.CLOUDS_MENU = PROCEDURAL_CLOUDS CLOUD_HEIGHT CLOUD_THICKNESS
screen.POST_PROCESS = FOG_DENSITY_LEVEL EXPOSURE VIGNETTE

# Profiles Configuration
profile.LOW = !SHADOWS !PROCEDURAL_CLOUDS !WATER_WAVES !PBR_LIGHTING SHADOW_RES=1024 WIND_SPEED=1 FOG_DENSITY_LEVEL=1 EXPOSURE=1 LIGHTMAP_WARMTH=1 WATER_TRANSPARENCY=1
profile.MED = SHADOWS PROCEDURAL_CLOUDS WATER_WAVES PBR_LIGHTING SHADOW_RES=2048 WIND_SPEED=2 FOG_DENSITY_LEVEL=2 EXPOSURE=2 LIGHTMAP_WARMTH=2 WATER_TRANSPARENCY=2 CLOUD_HEIGHT=2 CLOUD_THICKNESS=2 PBR_STRENGTH=2
profile.HIGH = SHADOWS PROCEDURAL_CLOUDS WATER_WAVES PBR_LIGHTING SHADOW_RES=4096 WIND_SPEED=2 FOG_DENSITY_LEVEL=2 EXPOSURE=2 LIGHTMAP_WARMTH=2 WATER_TRANSPARENCY=2 CLOUD_HEIGHT=2 CLOUD_THICKNESS=2 PBR_STRENGTH=2
profile.ULTRA = SHADOWS PROCEDURAL_CLOUDS WATER_WAVES PBR_LIGHTING SHADOW_RES=4096 WIND_SPEED=3 FOG_DENSITY_LEVEL=3 EXPOSURE=3 LIGHTMAP_WARMTH=3 WATER_TRANSPARENCY=3 CLOUD_HEIGHT=3 CLOUD_THICKNESS=3 PBR_STRENGTH=3

# Let Iris know that we do not want vanilla sun, moon, or clouds (we render our own beautiful ones)
sun=false
moon=false
clouds=false
sky=true
