# ==============================================================================
# AuraLite Shader Pack - Menu & Settings Configuration (v1.1.0)
# ==============================================================================
# [v1.1.0] REALTIME PHYSICAL SKY (EXPERIMENTAL, OFF in all profiles) — pure
#   per-pixel ray-marched scattering, no LUTs (avoids the gbuffers/composite
#   pipeline ordering issue). Exact 1st-order single scattering (Rayleigh +
#   Mie + Ozone) + blue-biased bounded multiple-scattering ambient (Rayleigh
#   re-scatters blue into the diffuse field → kills the yellow horizon band).
#   Enable manually via Experimental tab (SKY_MODE=1). SKY_MODE: 0=Gradient, 1=Physical.
# [v1.0.7] Comprehensive Bug Fix & Stability Update across all shader passes.
# [v1.0.7] Comprehensive Bug Fix & Stability Update across all shader passes.
# [v1.0.4] Full profile rebalance: smoother progression, better feature distribution.
# [v1.0.4-fixed] Replaced fma() with direct multiply-add for GLSL compatibility.

# Main Screen Layout
screen = <profile> [TRANSLATION_NOTICE] [LIGHTING] [SUN_MOON] [FOLIAGE] [WATER] [CLOUDS_MENU] [POST_PROCESS] [EXPERIMENTAL]

# Sub-Screen Layouts
screen.TRANSLATION_NOTICE = <empty> <empty> <empty> <empty>
screen.LIGHTING = SHADOWS SHADOW_RES SHADOW_SOFTNESS SHADOW_DISTANCE SHADOW_TINT AMBIENT_BRIGHTNESS LIGHT_WRAP LIGHTMAP_WARMTH COZY_LIGHTS PBR_LIGHTING PBR_POM PBR_STRENGTH PBR_DISTANCE SSAO SSAO_STRENGTH SSR SSR_QUALITY SSR_STRENGTH
screen.SUN_MOON = SUN_INTENSITY SUN_TEMPERATURE SUN_HALO SUNRISE_GLOW <empty> MOON_INTENSITY MOON_TEMPERATURE
screen.FOLIAGE = WAVING_LEAVES WAVING_GRASS WIND_SPEED FOLIAGE_SSS
screen.WATER = WATER_WAVES WATER_TRANSPARENCY WATER_RIFFLES WATER_SPECULAR_STRENGTH <empty> WATER_WAVE_SCALE WATER_WAVE_DETAIL UNDERWATER_NIGHT_DARKNESS
screen.CLOUDS_MENU = PROCEDURAL_CLOUDS CLOUD_HEIGHT CLOUD_THICKNESS CLOUD_DISTANCE CLOUD_SHADOWS CLOUD_SHADOW_STRENGTH GODRAYS GODRAYS_QUALITY AURORA_MODE AURORA_SPEED AURORA_STRENGTH NEBULA_BRIGHTNESS STARS_BRIGHTNESS STARS_AMOUNT SHOOTING_STARS SHOOTING_STARS_FREQUENCY SHOOTING_STARS_BRIGHTNESS RAINBOW_STRENGTH
screen.POST_PROCESS = HEAT_SHIMMER HEAT_SHIMMER_STRENGTH SPATIAL_AA_MODE FOG_DENSITY_LEVEL GROUND_MIST EXPOSURE COLOR_SATURATION CONTRAST TAA TAA_STRENGTH VIGNETTE
screen.EXPERIMENTAL = SKY_MODE SKY_STYLE SKY_QUALITY

# ==============================================================================
# PROFILES — v1.1.0 with Atmospheric Scattering
# ==============================================================================

# VERY_LOW : maximum FPS — simple gradient sky (scattering OFF)
profile.VERY_LOW = PBR_DISTANCE=1 !SHADOWS !PROCEDURAL_CLOUDS !WATER_WAVES !WAVING_LEAVES !WAVING_GRASS !PBR_LIGHTING !PBR_POM SHADOW_RES=1024 SHADOW_SOFTNESS=1 SHADOW_DISTANCE=1 SHADOW_TINT=1 AMBIENT_BRIGHTNESS=1 LIGHT_WRAP=1 SUN_INTENSITY=1 MOON_INTENSITY=1 SUN_TEMPERATURE=2 MOON_TEMPERATURE=2 !SUN_HALO !SUNRISE_GLOW WIND_SPEED=1 FOG_DENSITY_LEVEL=1 EXPOSURE=1 LIGHTMAP_WARMTH=1 WATER_TRANSPARENCY=1 AURORA_MODE=0 AURORA_SPEED=1 AURORA_STRENGTH=1 NEBULA_BRIGHTNESS=1 STARS_BRIGHTNESS=1 STARS_AMOUNT=1 RAINBOW_STRENGTH=1 !COZY_LIGHTS !WET_REFLECTIONS !GROUND_MIST CLOUD_HEIGHT=1 CLOUD_THICKNESS=1 CLOUD_DISTANCE=1 !CLOUD_SHADOWS CLOUD_SHADOW_STRENGTH=1 !GODRAYS GODRAYS_QUALITY=1 PBR_STRENGTH=1 COLOR_SATURATION=1 CONTRAST=1 WATER_RIFFLES=1 WATER_SPECULAR_STRENGTH=1 !TAA TAA_STRENGTH=1 !VIGNETTE !SSAO SSAO_STRENGTH=1 !SSR SSR_QUALITY=1 SSR_STRENGTH=1 WATER_WAVE_SCALE=1 WATER_WAVE_DETAIL=1 UNDERWATER_NIGHT_DARKNESS=1 !SHOOTING_STARS SHOOTING_STARS_FREQUENCY=1 SHOOTING_STARS_BRIGHTNESS=1 !FOLIAGE_SSS !HEAT_SHIMMER HEAT_SHIMMER_STRENGTH=1 SPATIAL_AA_MODE=0 SKY_MODE=0 SKY_STYLE=1

