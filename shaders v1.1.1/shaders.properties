# G-Buffer precision: full HDR pipeline (16-bit half-float).
# colortex0 : albedo (gbuffers) → fully lit scene (composite/TAA). RGBA16F turns the
#             whole pipeline into true HDR: bright sources (sun disk ~12-16, lava,
#             specular, portals) no longer clip to 1.0 BEFORE tone mapping, so the
#             ACES/AgX curves in final.fsh finally compress highlights instead of
#             receiving already-clamped input. Bloom samples real HDR luminance.
# colortex1 : lightmap.xy, roughness.z, metalness.w  -> smoother specular/metal gradients
# colortex2 : packed normal.xyz + 5-value material tag in alpha (0.0/0.1/0.62/0.8/1.0).
#             RGBA16F preserves every tag exactly (RGB10_A2's 2-bit alpha would alias
#             0.62->0.667 and 0.8->0.667, colliding foliage with water and breaking
#             SSR/heat-shimmer/SSS detection). No GLSL changes needed.
# [v1.1.1] NOTE: Iris/OptiFine buffer formats/clear flags are GLSL const-directives,
# not shaders.properties keys. The real directives were moved to composite.fsh:
#   const int  colortex0Format = RGBA16F;
#   const int  colortex1Format = RGBA16F;
#   const int  colortex2Format = RGBA16F;
#   const int  colortex7Format = RGBA16F;
#   const bool colortex7Clear  = false;


# Custom Uniforms
variable.bool.auroraColdBiomeRaw = in(biome_category, 1, 7) || biome_precipitation == 2 || temperature < 0.25
uniform.float.auroraColdBiome = smooth(42, if(auroraColdBiomeRaw, 1.0, 0.0), 20, 60)

variable.bool.isNetherRaw = in(biome, BIOME_NETHER, BIOME_NETHER_WASTES, BIOME_SOUL_SAND_VALLEY, BIOME_WARPED_FOREST, BIOME_CRIMSON_FOREST, BIOME_BASALT_DELTAS)
uniform.float.isNetherBiome = smooth(20, if(isNetherRaw, 1.0, 0.0), 10, 30)

variable.bool.isEndRaw = in(biome, BIOME_THE_END, BIOME_SMALL_END_ISLANDS, BIOME_END_MIDLANDS, BIOME_END_HIGHLANDS, BIOME_END_BARRENS)
uniform.float.isEndBiome = smooth(20, if(isEndRaw, 1.0, 0.0), 10, 30)

sun=false
moon=false
# [v1.1.1] Force vanilla Minecraft clouds off; gbuffers_clouds.* also discards them as a fallback.
clouds=false
sky=true
