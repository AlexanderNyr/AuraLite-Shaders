# ==============================================================================
# AuraLite Shader Pack - Menu & Settings Configuration (v0.2.5 Settings Fix)
# ==============================================================================
# [FIX v0.2.3] profile.LOW now includes ALL settings keys for consistency.
# [FIX v0.2.3] Added !GROUND_MIST, CONTRAST, COLOR_SATURATION, VIGNETTE, etc. to LOW.
# [FIX v0.2.5] Added <profile> to the main settings screen so presets are visible in-game.
# [FIX v0.2.5] POM is disabled in ALL presets, including ULTRA, because it is unstable on some resource packs/drivers.
# [FIX v0.2.5] Added a settings notice that translations may contain mistakes.
# [FIX v0.2.5] AURORA_MODE=1 now uses a real cold-biome custom uniform instead of fogColor heuristics.
# [FIX v0.2.5] Aurora rendering moved to gbuffers_skybasic and north mask fixed so it is visible again.
# [FIX v0.2.5] CLOUD_DISTANCE added; cloud draw distance scales with LOW/MED/HIGH/ULTRA profiles.
# [FIX v0.2.5] Added EXTREME profile with SSAO/SAO-style contact ambient occlusion.
# [FIX v0.2.5] All profiles use realistic terminator LIGHT_WRAP=1; SSAO enabled on HIGH/ULTRA/EXTREME.

# Main Screen Layout
screen = <profile> [TRANSLATION_NOTICE] [LIGHTING] [SUN_MOON] [FOLIAGE] [WATER] [CLOUDS_MENU] [POST_PROCESS]

# Sub-Screen Layouts
screen.TRANSLATION_NOTICE = <empty> <empty> <empty> <empty>
screen.LIGHTING = SHADOWS SHADOW_RES SHADOW_SOFTNESS SHADOW_DISTANCE SHADOW_TINT AMBIENT_BRIGHTNESS LIGHT_WRAP LIGHTMAP_WARMTH COZY_LIGHTS PBR_LIGHTING PBR_POM PBR_STRENGTH SSAO SSAO_STRENGTH
screen.SUN_MOON = SUN_INTENSITY SUN_TEMPERATURE SUN_HALO SUNRISE_GLOW <empty> MOON_INTENSITY MOON_TEMPERATURE
screen.FOLIAGE = WAVING_LEAVES WAVING_GRASS WIND_SPEED
screen.WATER = WATER_WAVES WATER_TRANSPARENCY WATER_RIFFLES WATER_SPECULAR_STRENGTH
screen.CLOUDS_MENU = PROCEDURAL_CLOUDS CLOUD_HEIGHT CLOUD_THICKNESS CLOUD_DISTANCE AURORA_MODE AURORA_SPEED AURORA_STRENGTH NEBULA_BRIGHTNESS STARS_BRIGHTNESS STARS_AMOUNT RAINBOW_STRENGTH
screen.POST_PROCESS = FOG_DENSITY_LEVEL GROUND_MIST EXPOSURE COLOR_SATURATION CONTRAST VIGNETTE

# Profiles Configuration
# [FIX v0.2.3] profile.LOW now contains every settings key for reliable profile switching
profile.LOW = !SHADOWS !PROCEDURAL_CLOUDS !WATER_WAVES !PBR_LIGHTING !PBR_POM SHADOW_RES=1024 SHADOW_SOFTNESS=1 SHADOW_DISTANCE=1 SHADOW_TINT=1 AMBIENT_BRIGHTNESS=2 LIGHT_WRAP=1 SUN_INTENSITY=2 MOON_INTENSITY=2 SUN_TEMPERATURE=2 MOON_TEMPERATURE=2 !SUN_HALO !SUNRISE_GLOW WIND_SPEED=1 FOG_DENSITY_LEVEL=1 EXPOSURE=1 LIGHTMAP_WARMTH=1 WATER_TRANSPARENCY=1 AURORA_MODE=0 AURORA_SPEED=1 AURORA_STRENGTH=1 NEBULA_BRIGHTNESS=1 STARS_BRIGHTNESS=1 STARS_AMOUNT=1 RAINBOW_STRENGTH=1 !COZY_LIGHTS !WET_REFLECTIONS !GROUND_MIST CLOUD_HEIGHT=2 CLOUD_THICKNESS=1 CLOUD_DISTANCE=1 PBR_STRENGTH=1 COLOR_SATURATION=2 CONTRAST=1 WATER_RIFFLES=1 WATER_SPECULAR_STRENGTH=1 VIGNETTE !SSAO SSAO_STRENGTH=1
