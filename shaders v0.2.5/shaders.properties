# Custom Uniforms
# True cold-biome mask for AURORA_MODE=1 (Only in Cold Biomes).
# The old implementation guessed cold biomes from fogColor, which is unreliable and often false.
# Uses OptiFine/Iris shader parameters: biome_category, biome_precipitation and temperature.
# biome_category: 1 = TAIGA, 7 = ICY; biome_precipitation: 2 = SNOW
variable.bool.auroraColdBiomeRaw = in(biome_category, 1, 7) || biome_precipitation == 2 || temperature < 0.25
uniform.float.auroraColdBiome = smooth(42, if(auroraColdBiomeRaw, 1.0, 0.0), 20, 60)

# Let Iris know that we do not want vanilla sun, moon, or clouds (we render our own beautiful ones)
sun=false
moon=false
clouds=false
sky=true
