# ==============================================================================
# AuraLite Shader Pack - Menu & Settings Configuration (v0.2.3 Bug-Fix Edition)
# ==============================================================================
# [FIX v0.2.3] profile.LOW now includes ALL settings keys for consistency.
# [FIX v0.2.3] Added !GROUND_MIST, CONTRAST, COLOR_SATURATION, VIGNETTE, etc. to LOW.

# Main Screen Layout
screen = [LIGHTING] [SUN_MOON] [FOLIAGE] [WATER] [CLOUDS_MENU] [POST_PROCESS]

# Sub-Screen Layouts
screen.LIGHTING = SHADOWS SHADOW_RES SHADOW_SOFTNESS SHADOW_DISTANCE SHADOW_TINT AMBIENT_BRIGHTNESS LIGHT_WRAP LIGHTMAP_WARMTH COZY_LIGHTS PBR_LIGHTING PBR_POM PBR_STRENGTH
screen.SUN_MOON = SUN_INTENSITY SUN_TEMPERATURE SUN_HALO SUNRISE_GLOW <empty> MOON_INTENSITY MOON_TEMPERATURE
screen.FOLIAGE = WAVING_LEAVES WAVING_GRASS WIND_SPEED
screen.WATER = WATER_WAVES WATER_TRANSPARENCY WATER_RIFFLES WATER_SPECULAR_STRENGTH
screen.CLOUDS_MENU = PROCEDURAL_CLOUDS CLOUD_HEIGHT CLOUD_THICKNESS AURORA_MODE AURORA_SPEED AURORA_STRENGTH NEBULA_BRIGHTNESS STARS_BRIGHTNESS STARS_AMOUNT RAINBOW_STRENGTH
screen.POST_PROCESS = FOG_DENSITY_LEVEL GROUND_MIST EXPOSURE COLOR_SATURATION CONTRAST VIGNETTE

# Profiles Configuration
# [FIX v0.2.3] profile.LOW now contains every settings key for reliable profile switching
profile.LOW = !SHADOWS !PROCEDURAL_CLOUDS !WATER_WAVES !PBR_LIGHTING !PBR_POM SHADOW_RES=1024 SHADOW_SOFTNESS=1 SHADOW_DISTANCE=1 SHADOW_TINT=1 AMBIENT_BRIGHTNESS=2 LIGHT_WRAP=1 SUN_INTENSITY=2 MOON_INTENSITY=2 SUN_TEMPERATURE=2 MOON_TEMPERATURE=2 !SUN_HALO !SUNRISE_GLOW WIND_SPEED=1 FOG_DENSITY_LEVEL=1 EXPOSURE=1 LIGHTMAP_WARMTH=1 WATER_TRANSPARENCY=1 AURORA_MODE=0 AURORA_SPEED=1 AURORA_STRENGTH=1 NEBULA_BRIGHTNESS=1 STARS_BRIGHTNESS=1 STARS_AMOUNT=1 RAINBOW_STRENGTH=1 !COZY_LIGHTS !WET_REFLECTIONS !GROUND_MIST CLOUD_HEIGHT=2 CLOUD_THICKNESS=1 PBR_STRENGTH=1 COLOR_SATURATION=2 CONTRAST=1 WATER_RIFFLES=1 WATER_SPECULAR_STRENGTH=1 VIGNETTE
profile.MED = SHADOWS PROCEDURAL_CLOUDS WATER_WAVES PBR_LIGHTING !PBR_POM SHADOW_RES=2048 SHADOW_SOFTNESS=2 SHADOW_DISTANCE=2 SHADOW_TINT=2 AMBIENT_BRIGHTNESS=2 LIGHT_WRAP=2 SUN_INTENSITY=2 MOON_INTENSITY=2 SUN_TEMPERATURE=2 MOON_TEMPERATURE=2 SUN_HALO SUNRISE_GLOW WIND_SPEED=2 FOG_DENSITY_LEVEL=2 EXPOSURE=2 LIGHTMAP_WARMTH=2 WATER_TRANSPARENCY=2 CLOUD_HEIGHT=2 CLOUD_THICKNESS=2 PBR_STRENGTH=2 AURORA_MODE=1 AURORA_SPEED=2 AURORA_STRENGTH=2 NEBULA_BRIGHTNESS=2 STARS_BRIGHTNESS=2 STARS_AMOUNT=2 RAINBOW_STRENGTH=2 COZY_LIGHTS WET_REFLECTIONS GROUND_MIST COLOR_SATURATION=2 CONTRAST=2 WATER_RIFFLES=2 WATER_SPECULAR_STRENGTH=2 VIGNETTE
profile.HIGH = SHADOWS PROCEDURAL_CLOUDS WATER_WAVES PBR_LIGHTING !PBR_POM SHADOW_RES=4096 SHADOW_SOFTNESS=2 SHADOW_DISTANCE=3 SHADOW_TINT=2 AMBIENT_BRIGHTNESS=2 LIGHT_WRAP=2 SUN_INTENSITY=3 MOON_INTENSITY=3 SUN_TEMPERATURE=2 MOON_TEMPERATURE=2 SUN_HALO SUNRISE_GLOW WIND_SPEED=2 FOG_DENSITY_LEVEL=2 EXPOSURE=2 LIGHTMAP_WARMTH=2 WATER_TRANSPARENCY=2 CLOUD_HEIGHT=2 CLOUD_THICKNESS=2 PBR_STRENGTH=2 AURORA_MODE=1 AURORA_SPEED=2 AURORA_STRENGTH=2 NEBULA_BRIGHTNESS=2 STARS_BRIGHTNESS=2 STARS_AMOUNT=2 RAINBOW_STRENGTH=2 COZY_LIGHTS WET_REFLECTIONS GROUND_MIST COLOR_SATURATION=2 CONTRAST=2 WATER_RIFFLES=2 WATER_SPECULAR_STRENGTH=2 VIGNETTE
